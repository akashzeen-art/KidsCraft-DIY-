<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- K -->
  <text x="5" y="42" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="white">K</text>
  <!-- C -->
  <text x="30" y="42" font-family="Arial Black, sans-serif" font-weight="900" font-size="26" fill="#FDE68A">C</text>
  <!-- Star sparkle -->
  <text x="44" y="20" font-size="14" fill="#FDE68A">✦</text>
</svg>
